name: Release artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish or test (for example, 0.1.0)"
        required: true
        type: string
      dry-run:
        description: "Build and validate without publishing"
        required: false
        default: true
        type: boolean

env:
  RELEASE_VERSION: ${{ github.event.release.tag_name || inputs.version }}

jobs:
  build-gem:
    name: Build gem
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.305.0

      - name: Build gem
        shell: bash
        run: bin/release "$RELEASE_VERSION"

      - name: Upload built gem artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: built-gem
          path: pkg/*.gem
          if-no-files-found: error
          retention-days: 7

      - name: Upload gem to GitHub Release
        if: ${{ github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_VERSION" pkg/*.gem --clobber

  publish-gem:
    name: Publish gem
    needs: [build-gem]
    runs-on: ubuntu-latest
    environment: release-gem
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.305.0

      - name: Download built gem artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: built-gem
          path: pkg

      - name: Configure RubyGems credentials
        if: ${{ github.event_name == 'release' || !inputs.dry-run }}
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Validate gem artifact
        if: ${{ inputs.dry-run }}
        run: gem specification pkg/*.gem name

      - name: Publish gem
        if: ${{ github.event_name == 'release' || !inputs.dry-run }}
        run: gem push pkg/*.gem
