name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Release
        run: .github/release.sh jekyll-awesome-nav.gemspec
        env:
          RUBYGEMS_USERNAME: ${{ secrets.RUBYGEMS_USERNAME }}
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
