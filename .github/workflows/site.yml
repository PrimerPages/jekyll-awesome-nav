# Workflow for building and deploying a Jekyll site to GitHub Pages
name: site

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-site:
    runs-on: ubuntu-latest
    outputs:
      host: ${{ steps.pages.outputs.host || steps.defaults.outputs.host }}
      base-path: ${{ steps.pages.outputs.base_path || steps.defaults.outputs.base_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.306.0
        with:
          bundler-cache: true

      - name: Default outputs
        id: defaults
        run: |
          echo "host=${{ github.repository_owner }}.github.io" | tee -a "$GITHUB_OUTPUT"
          echo "base_path=/${{ github.event.repository.name }}" | tee -a "$GITHUB_OUTPUT"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path || steps.defaults.outputs.base_path }}" --source site --destination _site
        env:
          JEKYLL_ENV: production
          JEKYLL_GITHUB_TOKEN: ${{ github.token }}

      - name: Debug output
        run: |
          tree _site
          cat "_site/index.html"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages
          path: _site

  test-site:
    needs: build-site
    permissions:
      contents: read
    uses: athackst/ci/.github/workflows/htmlproofer_site.yml@main
    with:
      host: ${{ needs.build-site.outputs.host }}
      base-path: ${{ needs.build-site.outputs.base-path }}
      artifact-name: github-pages
      htmlproofer-ignore-urls: https://opensource.org/license/mit/

  deploy-site:
    if: github.ref == 'refs/heads/main'
    needs: build-site
    permissions:
      pages: write
      id-token: write
      actions: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  site-success:
    if: always()
    runs-on: ubuntu-latest
    needs: [build-site, test-site, deploy-site]
    steps:
      - run: exit 1
        if: >-
          ${{
               contains(needs.*.result, 'failure')
            || contains(needs.*.result, 'cancelled')
          }}
      - run: echo "All site checks completed successfully."
