{% for item in include.items %}
  <li>
    <a
      href="{{ item.url | relative_url }}"
      {% if item.url == page.url %}aria-current="page"{% endif %}
    >
      {{ item.title }}
    </a>
    {% if item.children %}
      <ul>
        {% include awesome-nav-demo-tree.html items=item.children %}
      </ul>
    {% endif %}
  </li>
{% endfor %}
